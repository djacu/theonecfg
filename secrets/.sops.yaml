# sops-nix recipient configuration for theonecfg.
#
# Two classes of recipients can decrypt host secrets:
#
# 1. User PGP key (lives on the YubiKey, accessed via gpg-agent).
#    sops supports PGP natively. Editing secrets requires a YubiKey
#    touch each time gpg-agent invokes the key.
#
# 2. Per-host age keys derived from each NixOS host's ssh_host_ed25519_key.
#    sops doesn't natively read SSH keys — we convert each host's
#    SSH ed25519 pubkey to an age recipient with `ssh-to-age` and record
#    the result here. At runtime, sops-nix is configured with
#    `sops.age.sshKeyPaths` (see nixos-modules/services/sops/module.nix);
#    it runs the equivalent derivation on the SSH PRIVATE key to get the
#    matching age secret key. Same SSH key, two views.
#
# Adding a host (run on the host, after first boot — its host key
# must persist across rollbacks where applicable, e.g. /persist/etc/ssh/
# on impermanence hosts):
#   nix shell --inputs-from . nixpkgs#ssh-to-age \
#     -c ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub
# Paste the age1... output into the matching anchor below, then:
#   sops updatekeys secrets/<host>.yaml

keys:
  # User PGP key (YubiKey, fingerprint from `gpg --list-keys --with-colons`).
  - &djacu_pgp 6EC37842237BED45CBA6D3A58C9CFEF8EE37DA95

  # Per-host age keys (one per NixOS host that uses sops-nix).
  - &argentite_host age1q55snpartusp6v4r93q7c0wsa69slwm7nyjkem2rszkm5udahsnqwu8z5d
  - &malachite_host age175mddjunmr40g6h5ndxpz36ctaaejtrfrjzftjkvrgts83dvzqmsf4nf2s
  - &scheelite_host age1mgkhtld6ev40nspud8ak68car6a4qmqtxflgjjavjuy7n59vz5wq09evt5

creation_rules:
  - path_regex: argentite\.yaml$
    pgp:
      - *djacu_pgp
    age:
      - *argentite_host
  - path_regex: malachite\.yaml$
    pgp:
      - *djacu_pgp
    age:
      - *malachite_host
  - path_regex: scheelite\.yaml$
    pgp:
      - *djacu_pgp
    age:
      - *scheelite_host
